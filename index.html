<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GitScore — Analyze any GitHub profile. Get a hotness score, badges, language breakdown, and a roast.">
  <meta name="theme-color" content="#fbfbf8">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>GitScore — GitHub Profile Analyzer</title>
  <script>
    (function () {
      try {
        var stored = localStorage.getItem('gitscore:theme');
        var theme = stored || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
